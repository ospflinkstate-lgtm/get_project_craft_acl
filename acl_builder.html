<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firewall ACL Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.8);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #ef4444; /* Red for firewall/security vibe */
            --accent-glow: #f87171;
            --success: #10b981;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 1rem;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden;
        }
        * { box-sizing: border-box; }
        
        .header {
            text-align: center;
            margin-bottom: 1rem;
            flex-shrink: 0;
        }
        h1 {
            font-weight: 600;
            font-size: 2rem;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(to right, var(--accent), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle { color: var(--text-muted); margin: 0; }
        
        .layout {
            display: flex;
            flex: 1;
            gap: 1rem;
            overflow: hidden;
        }
        
        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .left-panel { flex: 2; overflow: hidden; }
        .right-panel { flex: 1; min-width: 350px; overflow: hidden; }
        
        /* Toolbar */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            gap: 10px;
        }
        .controls { display: flex; gap: 10px; }
        .input-control {
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-main);
            font-size: 0.9rem;
            outline: none;
        }
        .input-control:focus { border-color: var(--accent); }
        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .btn:hover { background: rgba(255,255,255,0.1); }
        .btn-success { background: rgba(16, 185, 129, 0.2); border-color: var(--success); color: var(--success); }
        .btn-success:hover { background: rgba(16, 185, 129, 0.3); }

        /* Table */
        .table-wrapper {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            position: sticky;
            top: 0;
            background: #1e293b;
            z-index: 10;
        }
        th, td {
            text-align: left;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }
        th { color: var(--text-muted); font-weight: 600; cursor: pointer; user-select: none; }
        th:hover { color: var(--text-main); }
        tr:hover td { background-color: rgba(255,255,255,0.03); }
        
        .row-selected td { background-color: rgba(16, 185, 129, 0.1) !important; }
        
        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid transparent;
        }
        .proto-tcp { background-color: rgba(56, 189, 248, 0.15); color: #38bdf8; border-color: rgba(56, 189, 248, 0.3); }
        .proto-udp { background-color: rgba(167, 139, 250, 0.15); color: #a78bfa; border-color: rgba(167, 139, 250, 0.3); }
        .proto-icmp { background-color: rgba(244, 63, 94, 0.15); color: #f43f5e; border-color: rgba(244, 63, 94, 0.3); }
        
        /* Top Talker Highlight */
        .row-top-talker { background-color: rgba(239, 68, 68, 0.05) !important; }
        .row-top-talker td:nth-child(6) { color: #f43f5e !important; font-weight: 700; text-shadow: 0 0 8px rgba(244, 63, 94, 0.4); }
        .talker-badge {
            background: #f43f5e;
            color: white;
            font-size: 0.65rem;
            padding: 1px 4px;
            border-radius: 4px;
            margin-left: 8px;
            vertical-align: middle;
            text-transform: uppercase;
        }
        
        /* Checkbox */
        .checkbox-cell { width: 40px; text-align: center; }
        input[type="checkbox"] {
            width: 16px; height: 16px;
            cursor: pointer;
            accent-color: var(--success);
        }

        /* Right Panel */
        .right-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .right-header h2 { margin: 0; font-size: 1.2rem; }
        
        .acl-output {
            flex: 1;
            background: #000;
            border-radius: 8px;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #a78bfa;
            overflow-y: auto;
            white-space: pre-wrap;
            border: 1px solid var(--border-color);
        }
        .acl-comment { color: #64748b; }
        .acl-keyword { color: #38bdf8; }
        .acl-ip { color: #f8fafc; }
        .acl-port { color: #f43f5e; }
        
        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); font-style: italic; }
        #dropZone {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 4px dashed var(--accent);
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div id="dropZone" style="display: flex;">
        <h2 style="color: var(--text-main);">Drop file .json here</h2>
        <p style="color: var(--text-muted);">or click to browse</p>
        <input type="file" id="fileInput" accept=".json" style="display:none;">
    </div>

    <div class="header">
        <h1>Firewall ACL Builder</h1>
        <p class="subtitle">Select allowed flows to 10.27.101.* and generate ACL rules automatically</p>
    </div>

    <div class="layout">
        <!-- Left Panel: Traffic Table -->
        <div class="panel left-panel">
            <div class="toolbar">
                <div class="controls">
                    <button class="btn btn-success" id="btnSelectAll">Select All Shown (200)</button>
                    <button class="btn" style="background: rgba(16,185,129,0.2); border: 1px solid #10b981; color: #10b981;" id="btnSelectAllMatched">✅ Select ALL Matched</button>
                    <button class="btn" id="btnDeselectAll">Deselect All</button>
                </div>
                <div class="controls">
                    <input type="text" id="tcpPortFilter" class="input-control" placeholder="TCP Port (e.g. 80-443)" style="width: 180px;">
                    <input type="text" id="searchInput" class="input-control" placeholder="Search IP, Port..." style="width: 200px;">
                </div>
            </div>

            <div class="table-wrapper">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th class="checkbox-cell"></th>
                            <th data-sort="src_addr">Source IP</th>
                            <th data-sort="dst_addr">Destination IP</th>
                            <th data-sort="dst_port">Port</th>
                            <th data-sort="proto">Protocol</th>
                            <th data-sort="total_gb" style="text-align: right;">Total GB</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="6" class="empty-state">Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
            <div style="margin-top: 10px; font-size: 0.85rem; color: var(--text-muted);" id="statusText">
                0 flows selected.
            </div>
        </div>

        <!-- Right Panel: Generated Rules -->
        <div class="panel right-panel">
            <div class="right-header">
                <h2>Generated Rules</h2>
                <select id="formatSelect" class="input-control">
                    <option value="cisco">Cisco ACL (Standard)</option>
                    <option value="cisco-smart">Expert Policy Design (Cisco Object-Groups)</option>
                    <option value="iptables">iptables</option>
                    <option value="generic">Generic Text</option>
                </select>
            </div>
            <div class="acl-output" id="aclOutput">
                <span class="acl-comment"># Select flows from the table to generate rules here.</span>
            </div>
            <button class="btn btn-success" style="margin-top: 1rem; width: 100%;" id="btnCopy">
                Copy to Clipboard
            </button>
        </div>
    </div>

    <script>
        // Data State
        let currentData = [];
        let hostMap = {}; // From sub101.csv
        let subnetMap = []; // From subnetwork.csv
        let filteredData = [];
        let selectedFlows = new Set(); // store unique string identifiers for selected flows
        let sortCol = 'total_gb';
        let sortAsc = false;

        // DOM
        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const tcpPortFilter = document.getElementById('tcpPortFilter');
        const formatSelect = document.getElementById('formatSelect');
        const aclOutput = document.getElementById('aclOutput');
        const statusText = document.getElementById('statusText');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        // Helpers
        function getFlowId(hit) {
            return `${hit.src_addr}-${hit.dst_addr}-${hit.dst_port}-${hit.proto}`;
        }
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // Load Data
        function loadData(data) {
            currentData = data.hits || [];
            applyFilterAndSort();
            // Hide drop zone if data is loaded
            if (currentData.length > 0) {
                dropZone.style.display = 'none';
            }
        }

        // Render Table
        function renderTable() {
            tableBody.innerHTML = '';
            
            if (filteredData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="empty-state">No traffic found.</td></tr>`;
                return;
            }

            // Only render top 200 to keep UI fast
            const toRender = filteredData.slice(0, 200);
            
            // Identify Top Talker threshold (e.g., top 10% of rendered data)
            const sortedByTraffic = [...toRender].sort((a, b) => (b.total_gb || 0) - (a.total_gb || 0));
            const topTalkerThreshold = sortedByTraffic.length > 10 ? sortedByTraffic[Math.floor(toRender.length * 0.1)].total_gb : 999999;

            toRender.forEach((hit) => {
                const tr = document.createElement('tr');
                const flowId = getFlowId(hit);
                const isSelected = selectedFlows.has(flowId);
                
                if (isSelected) tr.classList.add('row-selected');

                let protoClass = 'proto-tcp';
                const protoUpper = hit.proto ? hit.proto.toUpperCase() : '';
                if (protoUpper === 'UDP') protoClass = 'proto-udp';
                if (protoUpper === 'ICMP') protoClass = 'proto-icmp';

                const totalGbStr = hit.total_gb > 0 ? `${formatNumber(hit.total_gb)} GB` : '< 1 GB';
                const isTopTalker = hit.total_gb >= topTalkerThreshold && hit.total_gb > 5; // Must be at least 5GB to be a "talker"
                if (isTopTalker) tr.classList.add('row-top-talker');

                tr.innerHTML = `
                    <td class="checkbox-cell">
                        <input type="checkbox" class="row-checkbox" data-id="${flowId}" ${isSelected ? 'checked' : ''}>
                    </td>
                    <td style="font-family: 'JetBrains Mono', monospace;">${hit.src_addr || '-'}</td>
                    <td style="font-family: 'JetBrains Mono', monospace; color: #cbd5e1;">${hit.dst_addr || '-'}</td>
                    <td style="font-family: 'JetBrains Mono', monospace;">${hit.dst_port !== undefined ? hit.dst_port : '-'}</td>
                    <td><span class="badge ${protoClass}">${hit.proto || '-'}</span></td>
                    <td style="text-align: right; color: #fbbf24; font-weight: 500;">
                        ${totalGbStr}
                        ${isTopTalker ? '<span class="talker-badge">Top Talker</span>' : ''}
                    </td>
                `;
                
                // Row click toggles checkbox
                tr.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'INPUT') {
                        const cb = tr.querySelector('input');
                        cb.checked = !cb.checked;
                        toggleFlow(flowId, cb.checked, hit);
                    }
                });

                // Checkbox direct click
                tr.querySelector('input').addEventListener('change', (e) => {
                    toggleFlow(flowId, e.target.checked, hit);
                });

                tableBody.appendChild(tr);
            });
            
            if (filteredData.length > 200) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td colspan="6" style="text-align: center; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 6px; padding: 12px;">
                    <span style="color: #fbbf24; font-weight: 600;">⚠️ Showing 200 of ${formatNumber(filteredData.length)} matched results.</span>
                    <span style="color: var(--text-muted); font-size: 0.8rem; display:block; margin-top:4px;">Use <strong style="color:#10b981">"Select ALL Matched"</strong> button to select all ${formatNumber(filteredData.length)} flows for ACL generation — or refine your search.</span>
                </td>`;
                tableBody.appendChild(tr);
            }
        }

        // Toggle Selection
        let selectedFlowObjects = new Map(); // Store hit object for ACL generation

        function toggleFlow(flowId, isSelected, hitObj) {
            if (isSelected) {
                selectedFlows.add(flowId);
                selectedFlowObjects.set(flowId, hitObj);
            } else {
                selectedFlows.delete(flowId);
                selectedFlowObjects.delete(flowId);
            }
            updateSelectionStatus();
            generateACL();
            
            // visually update row without full re-render
            const cb = document.querySelector(`input[data-id="${flowId}"]`);
            if (cb) {
                const tr = cb.closest('tr');
                if (isSelected) tr.classList.add('row-selected');
                else tr.classList.remove('row-selected');
            }
        }

        function updateSelectionStatus() {
            statusText.innerText = `${selectedFlows.size} flow(s) selected.`;
        }

        // Generate ACL Output
        function generateACL() {
            if (selectedFlows.size === 0) {
                aclOutput.innerHTML = '<span class="acl-comment"># No flows selected.</span>';
                return;
            }

            const format = formatSelect.value;
            let output = '<span class="acl-comment"># Generated Rules (' + format + ')</span>\n\n';

            // Group by Destination IP to make it cleaner? For now, list individually
            const flows = Array.from(selectedFlowObjects.values());
            
            if (format === 'cisco-smart') {
                output = `<span class="acl-comment">! ===================================================================\n`;
                output += `! SECURITY POLICY BLUEPRINT: NETWORK 10.27.101.0/24\n`;
                output += `! Generated: ${new Date().toISOString().split('T')[0]}\n`;
                output += `! Review Status: DRAFT (Pending Engineering Approval)\n`;
                output += `! ===================================================================</span>\n\n`;

                // 1. Group Data by Destination Host
                const destGroups = {};
                flows.forEach(hit => {
                    if (!destGroups[hit.dst_addr]) {
                        destGroups[hit.dst_addr] = { 
                            ip: hit.dst_addr,
                            info: hostMap[hit.dst_addr],
                            services: {} // port-proto -> sources set
                        };
                    }
                    const sKey = `${hit.dst_port}-${hit.proto}`;
                    if (!destGroups[hit.dst_addr].services[sKey]) {
                        destGroups[hit.dst_addr].services[sKey] = {
                            port: hit.dst_port,
                            proto: hit.proto,
                            sources: new Set()
                        };
                    }
                    destGroups[hit.dst_addr].services[sKey].sources.add(hit.src_addr);
                });

                // 2. Global Definitions Section
                output += `<span class="acl-comment">! --- GLOBAL OBJECT DEFINITIONS ---</span>\n`;
                
                // Host Objects
                Object.keys(destGroups).forEach(ip => {
                    const info = destGroups[ip].info;
                    const cleanName = (info && info.name) ? info.name.toUpperCase().replace(/[^A-Z0-9]/g, '_') : `HOST_${ip.replace(/\./g, '_')}`;
                    output += `<span class="acl-keyword">object network</span> ${cleanName}\n`;
                    output += ` <span class="acl-keyword">host</span> <span class="acl-ip">${ip}</span>\n`;
                    if (info && info.name) output += ` <span class="acl-keyword">description</span> ${info.name}\n`;
                });
                output += `!\n`;

                // Subnet Groups (Shared)
                const globalSubnets = {};
                flows.forEach(hit => {
                    const sub = findSubnetForIP(hit.src_addr);
                    if (sub) {
                        if (!globalSubnets[sub.name]) globalSubnets[sub.name] = { cidr: sub.cidr, ips: new Set() };
                        globalSubnets[sub.name].ips.add(hit.src_addr);
                    }
                });

                Object.entries(globalSubnets).forEach(([name, data]) => {
                    const ogName = `GRP_NET_${name.toUpperCase().replace(/[^A-Z0-9]/g, '_')}`;
                    output += `<span class="acl-keyword">object-group network</span> ${ogName}\n`;
                    output += ` <span class="acl-keyword">description</span> Source: ${name}\n`;
                    data.ips.forEach(ip => output += ` <span class="acl-keyword">host</span> <span class="acl-ip">${ip}</span>\n`);
                    output += `!\n`;
                });

                // 2.2 Global Service Objects (Consolidate common ports across selection)
                const globalPorts = {};
                flows.forEach(hit => {
                    if (hit.dst_port && hit.dst_port !== 0) {
                        const key = `${hit.dst_port}-${hit.proto}`;
                        if (!globalPorts[key]) globalPorts[key] = { port: hit.dst_port, proto: hit.proto };
                    }
                });
                output += `\n`;

                // 3. Traffic Policy Section
                output += `<span class="acl-comment">! --- ACCESS CONTROL POLICIES ---</span>\n`;
                
                Object.values(destGroups).forEach(dst => {
                    const destName = (dst.info && dst.info.name) ? dst.info.name : dst.ip;
                    const destClean = destName.toUpperCase().replace(/[^A-Z0-9]/g, '_');
                    const destRef = `object ${(dst.info && dst.info.name) ? dst.info.name.toUpperCase().replace(/[^A-Z0-9]/g, '_') : `HOST_${dst.ip.replace(/\./g, '_')}`}`;
                    
                    output += `<span class="acl-comment">! [ POLICY SET: ${destName} ]</span>\n`;
                    
                    // 1. Consolidated Source Group for this Policy
                    const allSources = new Set();
                    Object.values(dst.services).forEach(s => s.sources.forEach(src => allSources.add(src)));
                    
                    const srcOgName = `GRP_SRC_${destClean}`;
                    output += `<span class="acl-keyword">object-group network</span> ${srcOgName}\n`;
                    allSources.forEach(ip => {
                        const sub = findSubnetForIP(ip);
                        if (sub) {
                            output += ` <span class="acl-keyword">network-object</span> <span class="acl-ip">${sub.network} ${sub.cidr.replace('/', '')}</span> <span class="acl-comment">! ${sub.name}</span>\n`;
                        } else {
                            output += ` <span class="acl-keyword">host</span> <span class="acl-ip">${ip}</span>\n`;
                        }
                    });
                    output += `!\n`;

                    // 2. Consolidated Service Group
                    const serviceKeys = Object.keys(dst.services);
                    let serviceRef = "";
                    let proto = "tcp"; 

                    if (serviceKeys.length > 1) {
                        const svcOgName = `SVC_${destClean}`;
                        output += `<span class="acl-keyword">object-group service</span> ${svcOgName} tcp-udp\n`;
                        serviceKeys.forEach(k => {
                            const svc = dst.services[k];
                            output += ` <span class="acl-keyword">port-object eq</span> <span class="acl-port">${svc.port}</span>\n`;
                            if (svc.proto === 'udp') proto = 'ip'; // Mixed protocols = use IP
                        });
                        output += `!\n`;
                        serviceRef = `object-group ${svcOgName}`;
                    } else if (serviceKeys.length === 1) {
                        const svc = Object.values(dst.services)[0];
                        proto = (svc.proto || 'tcp').toLowerCase();
                        serviceRef = svc.port !== undefined && svc.port !== 0 ? `eq <span class="acl-port">${svc.port}</span>` : '';
                    }

                    // 3. Single Modular Permit Rule
                    output += `<span class="acl-keyword">access-list 101 remark</span> -- Access to ${destName} --\n`;
                    output += `<span class="acl-keyword">access-list 101 permit</span> ${serviceKeys.length > 1 ? 'ip' : proto} <span class="acl-keyword">object-group</span> ${srcOgName} ${destRef} ${serviceRef}\n`;
                    output += `!\n`;
                });

                output += `<span class="acl-comment">! --- DEFAULT DENY POSTURE ---</span>\n`;
                output += `<span class="acl-keyword">access-list 101 deny ip any any log</span>\n`;

            } else {
                flows.forEach(hit => {
                    const src = hit.src_addr || 'any';
                    const dst = hit.dst_addr || 'any';
                    const port = hit.dst_port !== undefined && hit.dst_port !== 0 ? hit.dst_port : 'any';
                    const proto = (hit.proto || 'ip').toLowerCase();

                    if (format === 'cisco') {
                        let rule = `<span class="acl-keyword">permit</span> ${proto} `;
                        rule += src === 'any' ? 'any ' : `<span class="acl-keyword">host</span> <span class="acl-ip">${src}</span> `;
                        rule += dst === 'any' ? 'any ' : `<span class="acl-keyword">host</span> <span class="acl-ip">${dst}</span> `;
                        if (port !== 'any') rule += `<span class="acl-keyword">eq</span> <span class="acl-port">${port}</span>`;
                        output += rule + '\n';
                    } 
                    else if (format === 'iptables') {
                        let rule = `iptables -A INPUT -p ${proto} `;
                        if (src !== 'any') rule += `-s <span class="acl-ip">${src}</span> `;
                        if (dst !== 'any') rule += `-d <span class="acl-ip">${dst}</span> `;
                        if (port !== 'any') rule += `--dport <span class="acl-port">${port}</span> `;
                        rule += `-j <span class="acl-keyword">ACCEPT</span>`;
                        output += rule + '\n';
                    }
                    else {
                        output += `ALLOW | SRC: <span class="acl-ip">${src}</span> | DST: <span class="acl-ip">${dst}</span> | PROTO: ${proto.toUpperCase()} | PORT: <span class="acl-port">${port}</span>\n`;
                    }
                });
            }

            aclOutput.innerHTML = output;
        }

        formatSelect.addEventListener('change', generateACL);

        // Sorting & Filtering
        function applyFilterAndSort() {
            const q = searchInput.value.toLowerCase();
            const portQuery = tcpPortFilter.value.trim();

            filteredData = currentData.filter(hit => {
                // TCP Port Filter logic (supports single port or range like 80-443)
                if (portQuery !== '') {
                    const hitProto = (hit.proto || '').toUpperCase();
                    if (hitProto !== 'TCP') return false;

                    const hitPort = hit.dst_port;
                    if (portQuery.includes('-')) {
                        const parts = portQuery.split('-');
                        const start = parseInt(parts[0].trim());
                        const end = parseInt(parts[1].trim());
                        
                        if (!isNaN(start) && !isNaN(end)) {
                            if (hitPort < start || hitPort > end) return false;
                        } else if (!isNaN(start)) {
                            if (hitPort < start) return false;
                        } else if (!isNaN(end)) {
                            if (hitPort > end) return false;
                        }
                    } else {
                        if (String(hitPort) !== portQuery) return false;
                    }
                }
                if (q) {
                    const escapedQ = q.replace(/\./g, '\\.');
                    const ipRegex = new RegExp(`(^|\\.)${escapedQ}(\\.|$)`, 'i');
                    const textMatch = ipRegex.test(hit.src_addr || '') ||
                                      ipRegex.test(hit.dst_addr || '') ||
                                      (hit.dst_port !== undefined && String(hit.dst_port).includes(q));
                    if (!textMatch) return false;
                }
                return true;
            });

            filteredData.sort((a, b) => {
                let valA = a[sortCol]; let valB = b[sortCol];
                if (valA === undefined) valA = ''; if (valB === undefined) valB = '';
                if (typeof valA === 'number') return sortAsc ? valA - valB : valB - valA;
                valA = String(valA).toLowerCase(); valB = String(valB).toLowerCase();
                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });

            renderTable();
        }

        searchInput.addEventListener('input', applyFilterAndSort);
        tcpPortFilter.addEventListener('input', applyFilterAndSort);

        document.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                const col = th.getAttribute('data-sort');
                if (sortCol === col) sortAsc = !sortAsc;
                else { sortCol = col; sortAsc = (col !== 'total_gb'); }
                applyFilterAndSort();
            });
        });

        // Select Buttons
        document.getElementById('btnSelectAll').addEventListener('click', () => {
            filteredData.slice(0, 200).forEach(hit => {
                const id = getFlowId(hit);
                selectedFlows.add(id);
                selectedFlowObjects.set(id, hit);
            });
            renderTable();
            updateSelectionStatus();
            generateACL();
        });

        document.getElementById('btnSelectAllMatched').addEventListener('click', () => {
            // Select ALL filtered results regardless of the 200-row render limit
            filteredData.forEach(hit => {
                const id = getFlowId(hit);
                selectedFlows.add(id);
                selectedFlowObjects.set(id, hit);
            });
            renderTable();
            updateSelectionStatus();
            generateACL();
            const btn = document.getElementById('btnSelectAllMatched');
            const orig = btn.innerText;
            btn.innerText = `✅ Selected ${formatNumber(filteredData.length)} flows!`;
            setTimeout(() => btn.innerText = orig, 3000);
        });

        document.getElementById('btnDeselectAll').addEventListener('click', () => {
            selectedFlows.clear();
            selectedFlowObjects.clear();
            renderTable();
            updateSelectionStatus();
            generateACL();
        });

        // Copy Button
        document.getElementById('btnCopy').addEventListener('click', () => {
            const text = aclOutput.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('btnCopy');
                btn.innerText = 'Copied!';
                setTimeout(() => btn.innerText = 'Copy to Clipboard', 2000);
            });
        });

        // Parsing CSV Helpers
        function parseSub101(csv) {
            const lines = csv.split('\n');
            const map = {};
            lines.forEach((line, i) => {
                if (i === 0) return;
                const cols = line.split(',');
                if (cols.length >= 3 && cols[0]) {
                    map[cols[0].trim()] = {
                        name: cols[2]?.trim(),
                        type: cols[1]?.trim()
                    };
                }
            });
            return map;
        }

        function parseSubnetworks(csv) {
            const lines = csv.split('\n');
            const list = [];
            lines.forEach((line, i) => {
                if (i < 3) return; // Skip headers
                const cols = line.split(',');
                if (cols.length >= 9 && cols[2] && cols[5]) {
                    const network = cols[2].trim();
                    const cidr = cols[5].trim();
                    const name = cols[8]?.trim() || `VLAN_${cols[0]?.trim()}`;
                    if (network !== '-' && network !== '') {
                        list.push({ network, cidr, name, full: `${network}${cidr}` });
                    }
                }
            });
            return list;
        }

        function findSubnetForIP(ip) {
            // Simple check: most subnets are /24 or /22. We match by prefix for this PoC.
            for (const sub of subnetMap) {
                const prefix = sub.network.split('.').slice(0, 3).join('.'); // Match 10.27.x
                if (ip.startsWith(prefix)) return sub;
            }
            return null;
        }

        // Fetch / DragDrop
        Promise.all([
            fetch('sub101.csv').then(r => r.text()).catch(() => ''),
            fetch('subnetwork.csv').then(r => r.text()).catch(() => '')
        ]).then(([sub101, subnets]) => {
            if (sub101) hostMap = parseSub101(sub101);
            if (subnets) subnetMap = parseSubnetworks(subnets);
            console.log('Mapping data loaded.');
        });

        // Fetch / DragDrop
        fetch('network_traffic_full.json')
            .then(r => r.json())
            .then(loadData)
            .catch(() => { dropZone.style.display = 'flex'; });

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => e.preventDefault());
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', e => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });
        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    loadData(JSON.parse(e.target.result));
                    dropZone.style.display = 'none';
                } catch { alert('Invalid JSON'); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
